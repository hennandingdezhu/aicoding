spring.application.name=tokenscope
server.port=8081
spring.datasource.url=jdbc:h2:mem:tokenscope;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true
spring.h2.console.enabled=true
tokenscope.model=deepseek-v4-pro
tokenscope.input-price=1.10
tokenscope.output-price=4.40