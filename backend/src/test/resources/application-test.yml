spring:
  datasource:
    url: jdbc:h2:mem:warehouse_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: never

app:
  jwt:
    secret: test-secret-key-for-jwt-testing-purposes-only-2026
    expiration-ms: 3600000
